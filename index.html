<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบคลังอุปกรณ์ IT ตะวันออก</title>
    <!-- โหลด Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- โหลด SheetJS สำหรับ Export Excel -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <!-- โหลด Jspreadsheet (ตารางคล้าย Excel) -->
    <script src="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.13.3/dist/index.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jspreadsheet-ce@4.13.3/dist/jspreadsheet.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/jsuites@4.3.0/dist/jsuites.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsuites@4.3.0/dist/jsuites.min.css" />
</head>
<body class="bg-slate-100 font-sans text-gray-800">

    <!-- Navbar -->
    <nav class="bg-blue-800 text-white p-4 shadow-md">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold">🖥️ ระบบจัดการอุปกรณ์ IT (สายตะวันออก)</h1>
            <button id="btnHome" class="hidden bg-blue-600 px-4 py-2 rounded hover:bg-blue-700 transition">🏠 กลับหน้าหลัก</button>
        </div>
    </nav>

    <!-- หน้า Index (เลือกสถานี) -->
    <div id="indexPage" class="max-w-7xl mx-auto p-6 mt-6">
        <h2 class="text-2xl font-bold mb-6 text-center text-gray-700">เลือกสถานี / ชุดปฏิบัติการ</h2>
        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6" id="stationGrid">
            <!-- ปุ่มสถานีจะถูกสร้างด้วย Javascript -->
        </div>
    </div>

    <!-- หน้า จัดการข้อมูล (ตาราง Excel) -->
    <div id="editorPage" class="max-w-7xl mx-auto p-6 mt-6 hidden bg-white rounded-lg shadow">
        <div class="flex justify-between items-center mb-4 border-b pb-4">
            <h2 id="currentStationTitle" class="text-2xl font-bold text-blue-700">ชื่อสถานี</h2>
            <div class="space-x-2">
                <button onclick="saveDataLocal()" class="bg-green-600 text-white px-4 py-2 rounded shadow hover:bg-green-700 font-bold">💾 บันทึก (ในเครื่อง)</button>
                <button onclick="exportStationExcel()" class="bg-blue-600 text-white px-4 py-2 rounded shadow hover:bg-blue-700 font-bold">📥 Export เป็น Excel</button>
            </div>
        </div>
        
        <p class="text-sm text-gray-500 mb-2">* สามารถคัดลอก (Ctrl+C) จาก Excel มาวาง (Ctrl+V) ในตารางนี้ได้เลย</p>
        
        <!-- พื้นที่แสดงตาราง -->
        <div id="spreadsheet" class="w-full overflow-x-auto"></div>
    </div>

    <script>
        // รายชื่อสถานีอ้างอิงจากไฟล์ Excel ต้นฉบับ
        const stations = ['อรัญประเทศ', 'ฉก.182', 'โป่งน้ำร้อน', 'บูรพา', 'กปช.จต.', 'C2'];
        let currentStation = '';
        let myTable = null; // ตัวแปรเก็บ Object ตาราง

        // สร้างปุ่มเลือกสถานีในหน้าแรก
        const grid = document.getElementById('stationGrid');
        stations.forEach(station => {
            const btn = document.createElement('div');
            btn.className = "bg-white p-6 rounded-xl shadow-sm hover:shadow-md border-t-4 border-blue-500 cursor-pointer transform hover:-translate-y-1 transition text-center font-bold text-xl text-gray-700";
            btn.innerHTML = `📍 ${station}`;
            btn.onclick = () => openStation(station);
            grid.appendChild(btn);
        });

        // ฟังก์ชันสลับหน้าและเปิดตาราง
        function openStation(stationName) {
            currentStation = stationName;
            document.getElementById('indexPage').classList.add('hidden');
            document.getElementById('editorPage').classList.remove('hidden');
            document.getElementById('btnHome').classList.remove('hidden');
            document.getElementById('currentStationTitle').innerText = `ข้อมูลอุปกรณ์: ${stationName}`;
            
            initSpreadsheet(stationName);
        }

        // ฟังก์ชันกลับหน้าแรก
        document.getElementById('btnHome').onclick = () => {
            document.getElementById('indexPage').classList.remove('hidden');
            document.getElementById('editorPage').classList.add('hidden');
            document.getElementById('btnHome').classList.add('hidden');
            if (myTable) {
                myTable.destroy(); // ล้างตารางเดิมเมื่อกลับหน้าแรก
            }
        };

        // ฟังก์ชันสร้างตารางแบบ Excel
        function initSpreadsheet(stationName) {
            // ดึงข้อมูลเดิมจาก LocalStorage (ถ้ามี)
            let savedData = localStorage.getItem(`stationData_${stationName}`);
            let initialData = savedData ? JSON.parse(savedData) : [[]]; // ถ้าไม่มีข้อมูลให้เริ่มบรรทัดว่าง 1 บรรทัด

            const spreadsheetDiv = document.getElementById('spreadsheet');
            spreadsheetDiv.innerHTML = ''; // ล้างของเก่า

            // ตั้งค่าคอลัมน์ให้เหมือนไฟล์ Excel ของคุณ
            myTable = jspreadsheet(spreadsheetDiv, {
                data: initialData,
                columns: [
                    { type: 'numeric', title: 'ลำดับ', width: 60 },
                    { type: 'text', title: 'ยี่ห้อ CPU', width: 100 },
                    { type: 'text', title: 'รุ่น CPU', width: 120 },
                    { type: 'text', title: 'S/N CPU', width: 150 },
                    { type: 'text', title: 'ยี่ห้อจอ', width: 100 },
                    { type: 'text', title: 'รุ่นจอ', width: 120 },
                    { type: 'text', title: 'S/N จอ', width: 150 },
                    { type: 'text', title: 'USER / ผู้ใช้', width: 120 },
                    { type: 'dropdown', title: 'สถานะ', width: 80, source: ['ปกติ', 'ชำรุด', 'สำรอง'] },
                    { type: 'text', title: 'ระบบการเชื่อมต่อ', width: 130 },
                    { type: 'text', title: 'หมายเหตุ', width: 150 },
                ],
                nestedHeaders: [
                    [
                        { title: '', colspan: 1 },
                        { title: 'คอมพิวเตอร์ (CPU)', colspan: 3 },
                        { title: 'จอมอนิเตอร์', colspan: 3 },
                        { title: 'ข้อมูลการใช้งาน', colspan: 4 },
                    ]
                ],
                minDimensions: [11, 15], // เริ่มต้นให้มีอย่างน้อย 15 บรรทัด
                allowInsertRow: true,
                allowManualInsertRow: true,
                allowInsertColumn: false,
                wordWrap: true,
            });
        }

        // ฟังก์ชันบันทึกข้อมูลลงเครื่อง
        function saveDataLocal() {
            if (!myTable) return;
            const data = myTable.getData(); // ดึงข้อมูลทั้งหมดจากตาราง
            localStorage.setItem(`stationData_${currentStation}`, JSON.stringify(data));
            alert(`บันทึกข้อมูลของ ${currentStation} ลงในอุปกรณ์นี้เรียบร้อยแล้ว!`);
        }

        // ฟังก์ชัน Export Excel โครงสร้างเดิม
        function exportStationExcel() {
            if (!myTable) return;
            const tableData = myTable.getData();
            
            // สร้าง Header โครงสร้างเดิมของ Excel
            const headerData = [
                ["ลำดับ", "CPU", "", "", "จอ", "", "", "USER / ผู้ใช้", "สถานะ", "ระบบการเชื่อมต่อ", "หมายเหตุ"],
                ["", "ยี่ห้อ", "รุ่น", "S/N", "ยี่ห้อ", "รุ่น", "S/N", "", "", "", ""]
            ];

            const worksheet = XLSX.utils.aoa_to_sheet([...headerData, ...tableData]);

            // Merge Cells
            worksheet['!merges'] = [
                { s: { r: 0, c: 1 }, e: { r: 0, c: 3 } }, // CPU
                { s: { r: 0, c: 4 }, e: { r: 0, c: 6 } }, // จอ
                { s: { r: 0, c: 0 }, e: { r: 1, c: 0 } }, // ลำดับ
                { s: { r: 0, c: 7 }, e: { r: 1, c: 7 } }, // USER
                { s: { r: 0, c: 8 }, e: { r: 1, c: 8 } }, // สถานะ
                { s: { r: 0, c: 9 }, e: { r: 1, c: 9 } }, // การเชื่อมต่อ
                { s: { r: 0, c: 10 }, e: { r: 1, c: 10 } } // หมายเหตุ
            ];

            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, currentStation);
            XLSX.writeFile(workbook, `COMPUTER_${currentStation}.xlsx`);
        }
    </script>
</body>
</html>
