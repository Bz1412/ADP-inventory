<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADP AI-OFFICE | Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&family=Fira+Code&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0a0e17;
      --bg-panel: #111827;
      --bg-card: #1f2937;
      --neon-cyan: #06b6d4;
      --neon-purple: #a855f7;
      --neon-green: #10b981;
      --neon-red: #ef4444;
      --neon-yellow: #f59e0b;
      --text-main: #f3f4f6;
      --text-dim: #9ca3af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-main);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* === HEADER === */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 30px;
      background: rgba(17, 24, 39, 0.8);
      border-bottom: 1px solid var(--neon-cyan);
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.2);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 24px;
      letter-spacing: 2px;
      background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
    }
    .header-stats {
      display: flex;
      gap: 30px;
    }
    .stat-box {
      text-align: right;
    }
    .stat-label {
      font-size: 10px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .stat-value {
      font-family: 'Orbitron', sans-serif;
      font-size: 18px;
      color: var(--neon-cyan);
    }

    /* === MAIN LAYOUT === */
    .main-container {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* === LEFT PANEL: BOTS OVERVIEW === */
    .bots-panel {
      width: 380px;
      background: var(--bg-panel);
      border-right: 1px solid #333;
      display: flex;
      flex-direction: column;
    }
    .panel-header {
      padding: 20px;
      border-bottom: 1px solid #333;
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: var(--neon-purple);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .bots-list {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    /* Bot Card */
    .bot-card {
      background: var(--bg-card);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 15px;
      position: relative;
      transition: all 0.3s;
    }
    .bot-card:hover {
      border-color: var(--neon-purple);
      box-shadow: 0 0 15px rgba(168, 85, 247, 0.2);
      transform: translateY(-2px);
    }
    .bot-top {
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 15px;
    }
    .bot-avatar {
      width: 50px;
      height: 50px;
      background: #000;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      border: 2px solid var(--neon-cyan);
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.3);
    }
    .bot-info h3 {
      font-family: 'Orbitron', sans-serif;
      font-size: 14px;
      color: var(--neon-cyan);
      margin-bottom: 4px;
    }
    .bot-info p {
      font-size: 11px;
      color: var(--text-dim);
    }
    .bot-status {
      position: absolute;
      top: 15px;
      right: 15px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      text-transform: uppercase;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--neon-green);
      box-shadow: 0 0 8px var(--neon-green);
    }
    .status-dot.offline { background: var(--neon-red); box-shadow: 0 0 8px var(--neon-red); }
    
    .bot-actions {
      display: flex;
      gap: 10px;
    }
    .btn-action {
      flex: 1;
      padding: 8px;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      border: 1px solid #444;
      background: transparent;
      color: var(--text-main);
      border-radius: 4px;
      cursor: pointer;
      transition: 0.2s;
    }
    .btn-action:hover {
      background: rgba(255,255,255,0.1);
    }
    .btn-action.primary {
      border-color: var(--neon-cyan);
      color: var(--neon-cyan);
    }
    .btn-action.primary:hover {
      background: rgba(6, 182, 212, 0.2);
    }

    /* === RIGHT PANEL: 3D ISOMETRIC OFFICE === */
    .office-view {
      flex: 1;
      background: radial-gradient(circle at center, #1a1f2e 0%, #0a0e17 100%);
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }
    
    /* Isometric Grid Wrapper */
    .iso-wrapper {
      transform: rotateX(60deg) rotateZ(-45deg);
      transform-style: preserve-3d;
      position: relative;
      width: 600px;
      height: 400px;
    }

    .floor {
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        linear-gradient(to right, rgba(6, 182, 212, 0.05) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
      background-size: 40px 40px;
      border: 1px solid rgba(6, 182, 212, 0.2);
      box-shadow: 0 0 50px rgba(6, 182, 212, 0.1);
    }

    /* 3D Objects inside office */
    .obj-3d {
      position: absolute;
      transform-style: preserve-3d;
    }

    .room-block {
      width: 180px;
      height: 120px;
      background: rgba(17, 24, 39, 0.8);
      border: 1px solid rgba(168, 85, 247, 0.5);
      box-shadow: 0 0 20px rgba(168, 85, 247, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.3s;
    }
    .room-block:hover {
      border-color: var(--neon-cyan);
      box-shadow: 0 0 30px rgba(6, 182, 212, 0.4);
      transform: translateZ(10px); /* Lift up on hover */
    }
    .room-icon { font-size: 32px; margin-bottom: 10px; }
    .room-name {
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      color: var(--neon-cyan);
      text-transform: uppercase;
    }

    .pos-1 { top: 20px; left: 20px; }
    .pos-2 { top: 20px; left: 220px; }
    .pos-3 { top: 220px; left: 20px; }

    /* Agent walking in 3D space */
    .agent-3d {
      position: absolute;
      font-size: 24px;
      animation: float 3s ease-in-out infinite;
      filter: drop-shadow(0 0 5px var(--neon-green));
    }
    @keyframes float {
      0%, 100% { transform: translateZ(0px); }
      50% { transform: translateZ(15px); }
    }

    /* === BOTTOM PANEL: TERMINAL === */
    .terminal-panel {
      height: 180px;
      background: #000;
      border-top: 1px solid var(--neon-green);
      display: flex;
      flex-direction: column;
    }
    .term-header {
      padding: 5px 15px;
      background: #111;
      border-bottom: 1px solid #222;
      font-family: 'Fira Code', monospace;
      font-size: 11px;
      color: var(--neon-green);
      display: flex;
      justify-content: space-between;
    }
    .term-body {
      flex: 1;
      padding: 10px 15px;
      font-family: 'Fira Code', monospace;
      font-size: 12px;
      color: var(--neon-green);
      overflow-y: auto;
      line-height: 1.5;
    }
    .log-time { color: var(--text-dim); margin-right: 8px; }
    .log-sys { color: var(--neon-cyan); }
    .log-agent { color: var(--neon-purple); }
    .log-warn { color: var(--neon-yellow); }
    .log-err { color: var(--neon-red); }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

  </style>
</head>
<body>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">ADP AI-OFFICE</div>
    <div class="header-stats">
      <div class="stat-box">
        <div class="stat-label">Total Assets</div>
        <div class="stat-value" id="statAssets">1,245</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Active Agents</div>
        <div class="stat-value" id="statAgents">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">System Status</div>
        <div class="stat-value" style="color: var(--neon-green);">ONLINE</div>
      </div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main-container">
    
    <!-- LEFT: BOTS OVERVIEW -->
    <div class="bots-panel">
      <div class="panel-header">
        <span>BOTS OVERVIEW</span>
        <button class="btn-action primary" onclick="openCreateBot()">+ DEPLOY NEW</button>
      </div>
      <div class="bots-list" id="botsList">
        <!-- Bots will be rendered here -->
      </div>
    </div>

    <!-- RIGHT: 3D OFFICE VIEW -->
    <div class="office-view">
      <div class="iso-wrapper">
        <div class="floor"></div>
        
        <!-- ห้องต่างๆ ในสำนักงาน -->
        <div class="obj-3d room-block pos-1">
          <div class="room-icon">🖥️</div>
          <div class="room-name">MAIN OFFICE</div>
        </div>
        
        <div class="obj-3d room-block pos-2">
          <div class="room-icon">💽</div>
          <div class="room-name">SERVER ROOM</div>
        </div>
        
        <div class="obj-3d room-block pos-3">
          <div class="room-icon">☕</div>
          <div class="room-name">PANTRY / WH</div>
        </div>

        <!-- Agent ที่กำลังเดินไปมา -->
        <div id="agentContainer"></div>
      </div>
    </div>

  </div>

  <!-- BOTTOM: TERMINAL -->
  <div class="terminal-panel">
    <div class="term-header">
      <span>SYSTEM TERMINAL</span>
      <span>v6.2.1</span>
    </div>
    <div class="term-body" id="terminalLog">
      <div><span class="log-time">[00:00:00]</span> <span class="log-sys">System Initialized...</span></div>
      <div><span class="log-time">[00:00:01]</span> <span class="log-sys">Connecting to ADP Backend...</span></div>
      <div><span class="log-time">[00:00:02]</span> <span class="log-warn">Waiting for Agent deployment.</span></div>
    </div>
  </div>

  <script>
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwCut-_LOFpyERCvO2f_kc0MnaowZGZ6VafjwmCBY2sE4VSrDvLuDf-fuQmp5vI9naQ/exec'; // ใส่ URL ของ Google Apps Script ที่นี่
    
    let agents = [];
    
    // ตำแหน่ง Agent ในห้อง 3D (X, Y ใน iso-wrapper)
    const agentPositions = [
      {x: 100, y: 60}, {x: 300, y: 60}, {x: 100, y: 260}, {x: 300, y: 260}, {x: 200, y: 150}
    ];

    // ข้อมูล Class ของ Bot ที่รับหน้าที่เหมือน Warehouse
    const botClasses = [
      { id: 'sync', name: 'ATLAS', icon: '🤖', role: 'SYNC MASTER', desc: 'ซิงค์ข้อมูลสต็อกทั้งหมดไปคลังกลาง' },
      { id: 'audit', name: 'NOVA', icon: '🕵️', role: 'AUDITOR', desc: 'ตรวจสอบอุปกรณ์ชำรุดและแจ้งเตือน' },
      { id: 'report', name: 'SCRIBE', icon: '🧙', role: 'REPORTER', desc: 'ตรวจรายงานเดือนและทวงถามสถานี' },
      { id: 'wh_mgr', name: 'CUSTODIAN', icon: '📦', role: 'WH KEEPER', desc: 'จัดการรับ-คืน สินค้าเข้าคลังส่วนกลาง' }
    ];

    let selectedClass = botClasses[0];

    // Init
    window.onload = () => {
      renderBotClasses();
      addLog('sys', 'Dashboard ready. Deploy agents to begin tasks.');
    };

    function renderBotClasses() {
      const list = document.getElementById('botsList');
      list.innerHTML = '';
      
      botClasses.forEach((bot, index) => {
        const isDeployed = agents.some(a => a.id === bot.id);
        
        const card = document.createElement('div');
        card.className = 'bot-card';
        card.innerHTML = `
          <div class="bot-top">
            <div class="bot-avatar">${bot.icon}</div>
            <div class="bot-info">
              <h3>${bot.name}</h3>
              <p>${bot.role}</p>
            </div>
            <div class="bot-status">
              <div class="status-dot ${isDeployed ? '' : 'offline'}"></div>
              ${isDeployed ? 'ONLINE' : 'OFFLINE'}
            </div>
          </div>
          <p style="font-size:11px; color:#9ca3af; margin-bottom:15px;">${bot.desc}</p>
          <div class="bot-actions">
            ${isDeployed 
              ? `<button class="btn-action primary" onclick="runTask('${bot.id}')">▶ RUN TASK</button>
                 <button class="btn-action" onclick="recallBot('${bot.id}')" style="border-color:var(--neon-red); color:var(--neon-red);">RECALL</button>` 
              : `<button class="btn-action primary" style="flex:1" onclick="deployBot('${bot.id}')">DEPLOY AGENT</button>`
            }
          </div>
        `;
        list.appendChild(card);
      });
    }

    // จ้าง Agent ลงมาทำงานในห้อง
    function deployBot(botId) {
      const botData = botClasses.find(b => b.id === botId);
      if (!botData || agents.some(a => a.id === botId)) return;

      const pos = agentPositions[agents.length % agentPositions.length];

      const newAgent = {
        ...botData,
        x: pos.x,
        y: pos.y
      };

      agents.push(newAgent);
      
      // วาด Agent ลงในห้อง 3D
      const container = document.getElementById('agentContainer');
      const el = document.createElement('div');
      el.className = 'agent-3d';
      el.id = `agent_3d_${botId}`;
      el.style.left = pos.x + 'px';
      el.style.top = pos.y + 'px';
      el.innerHTML = botData.icon;
      container.appendChild(el);

      document.getElementById('statAgents').innerText = agents.length;
      addLog('agent', `${botData.name} (${botData.role}) deployed to office.`);
      renderBotClasses();
    }

    // สั่ง Recall Bot
    function recallBot(botId) {
      agents = agents.filter(a => a.id !== botId);
      const el = document.getElementById(`agent_3d_${botId}`);
      if (el) el.remove();

      document.getElementById('statAgents').innerText = agents.length;
      addLog('warn', `Agent ${botId} recalled.`);
      renderBotClasses();
    }

    // สั่งรัน Task ของ Agent (ทำหน้าที่เหมือน Warehouse.html)
    async function runTask(botId) {
      const agent = agents.find(a => a.id === botId);
      if (!agent) return;

      addLog('agent', `[${agent.name}] Executing task: ${agent.role}...`);

      try {
        let payload = {};
        let endpoint = BACKEND_URL;

        // แยกหน้าที่ตาม Class ของ Agent
        if (agent.id === 'sync') {
          // รัน Sync ข้อมูลไปคลังกลาง (เหมือนกดปุ่ม Sync ใน warehouse)
          addLog('sys', `[ATLAS] Reading local data and preparing SYNC to Central...`);
          payload = { action: 'SYNC_ASSETS', updates: [], logs: [{ station: 'AI Agent', action: 'Agent Sync', detail: 'ATLAS กำลังซิงค์ข้อมูลอัตโนมัติ' }] };
        } 
        else if (agent.id === 'audit') {
          // ตรวจสอบของชำรุด
          addLog('sys', `[NOVA] Scanning database for broken items...`);
          endpoint += '?action=GET_ALL'; // ดึงข้อมูลมาตรวจ
          const res = await fetch(endpoint);
          const data = await res.json();
          
          let brokenCount = 0;
          if(data.value) {
            const db = JSON.parse(data.value);
            // Logic ตรวจสอบของชำรุดเบื้องต้น
            const checkBroken = (arr) => { if(arr) arr.forEach(r => { if(r[5]==='ชำรุด') brokenCount++; }); };
            Object.values(db).forEach(stationData => {
              try {
                const sObj = JSON.parse(stationData);
                checkBroken(sObj.cpu); checkBroken(sObj.nb); checkBroken(sObj.mon);
              } catch(e) {}
            });
          }
          addLog(brokenCount > 0 ? 'err' : 'sys', `[NOVA] Audit complete. Found ${brokenCount} broken items.`);
          return; // จบการทำงานของ NOVA เพราะเป็น GET
        }
        else if (agent.id === 'report') {
          // ตรวจรายงานเดือน
          addLog('sys', `[SCRIBE] Checking monthly report status...`);
          endpoint += '?action=GET_ALL';
          const res = await fetch(endpoint);
          const data = await res.json();
          addLog('sys', `[SCRIBE] Report data fetched. Simulating confirmation...`);
          payload = { action: 'SAVE_OFFICE_STATE', value: JSON.stringify({checked: true}), logs: [{ station: 'AI Agent', action: 'Agent Report', detail: 'SCRIBE ตรวจสอบรายงาน' }] };
        }
        else if (agent.id === 'wh_mgr') {
          // จำลองการรับ-คืน ของเข้าคลัง
          addLog('sys', `[CUSTODIAN] Checking warehouse withdrawals...`);
          payload = { action: 'SAVE_OFFICE_STATE', value: JSON.stringify({wh_sync: true}), logs: [{ station: 'AI Agent', action: 'Agent WH', detail: 'CUSTODIAN กำลังจัดการคลังสินค้า' }] };
        }

        // ส่งข้อมูลไป Backend (หากเป็น POST)
        if (payload.action) {
          const response = await fetch(BACKEND_URL, {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          const result = await response.json();
          if (result.status === 'success') {
            addLog('sys', `[${agent.name}] Task completed successfully. Cloud synced.`);
          } else {
            addLog('err', `[${agent.name}] Backend error.`);
          }
        }

      } catch (error) {
        addLog('err', `[${agent.name}] Connection error: ${error.message}`);
      }
    }

    // Terminal Logger
    function addLog(type, message) {
      const logBody = document.getElementById('terminalLog');
      const now = new Date();
      const time = now.toTimeString().split(' ')[0];
      
      const classMap = {
        'sys': 'log-sys',
        'agent': 'log-agent',
        'warn': 'log-warn',
        'err': 'log-err'
      };

      const logClass = classMap[type] || 'log-sys';
      
      logBody.innerHTML += `<div><span class="log-time">[${time}]</span> <span class="${logClass}">${message}</span></div>`;
      logBody.scrollTop = logBody.scrollHeight;
    }
  </script>
</body>
</html>
