        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'], mono: ['VT323', 'monospace'] } } } }

    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; color: white; user-select: none; }
        
        /* 🌟 CSS ISOMETRIC ENGINE */
        .iso-container { perspective: 1500px; overflow: auto; cursor: grab; }
        .iso-container:active { cursor: grabbing; }

        .iso-world {
            position: relative; width: 800px; height: 800px; margin: 100px auto;
            transform-style: preserve-3d;
            transform: rotateX(60deg) rotateZ(-45deg); 
            transition: transform 0.5s ease;
        }

        /* 🌟 แผนผังห้อง */
        .iso-floor {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #8b5a2b; 
            background-image: linear-gradient(rgba(0,0,0,0.1) 2px, transparent 2px), linear-gradient(90deg, rgba(0,0,0,0.1) 2px, transparent 2px);
            background-size: 80px 80px; 
            box-shadow: inset 0 0 100px rgba(0,0,0,0.8), 20px 20px 50px rgba(0,0,0,0.5); border: 4px solid #5c3a21;
        }

        .iso-wall-left { position: absolute; top: 0; left: -20px; width: 20px; height: 100%; background-color: #94a3b8; transform-origin: right center; transform: rotateY(-90deg); border: 2px solid #475569; }
        .iso-wall-top { position: absolute; top: -20px; left: 0; width: 100%; height: 20px; background-color: #cbd5e1; transform-origin: bottom center; transform: rotateX(90deg); border: 2px solid #64748b; }

        /* 🌟 สิ่งของประกอบฉาก */
        .sprite-upright { position: absolute; transform-style: preserve-3d; transform: translateZ(0px) rotateZ(45deg) rotateX(-60deg); transform-origin: bottom center; transition: all 0.3s ease; }
        .prop-desk { width: 100px; height: 80px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 80"><rect y="40" width="100" height="40" fill="%23b45309" rx="4"/><rect x="10" y="20" width="80" height="40" fill="%23fcd34d" rx="2"/><rect x="30" y="10" width="40" height="25" fill="%231e293b" rx="2" stroke="%230f172a" stroke-width="2"/><rect x="45" y="35" width="10" height="10" fill="%2394a3b8"/></svg>') no-repeat bottom center; background-size: contain; filter: drop-shadow(10px 20px 10px rgba(0,0,0,0.5)); margin-left: -50px; margin-top: -80px;}
        .prop-rack { width: 120px; height: 140px; background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 140"><rect x="10" y="10" width="100" height="130" fill="%23475569" stroke="%231e293b" stroke-width="4"/><rect x="20" y="30" width="80" height="20" fill="%23ca8a04"/><rect x="20" y="70" width="35" height="20" fill="%233b82f6"/><rect x="65" y="70" width="35" height="20" fill="%23ef4444"/><rect x="20" y="110" width="80" height="20" fill="%2310b981"/></svg>') no-repeat bottom center; background-size: contain; filter: drop-shadow(15px 25px 15px rgba(0,0,0,0.6)); margin-left: -60px; margin-top: -140px;}

        /* ================================================= */
        /* 🌟 CSS PIXEL AVATAR GENERATOR (ไม่ต้องใช้รูปภาพ!) */
        /* ================================================= */
        .agent-bot { width: 60px; height: 80px; margin-left: -30px; margin-top: -90px; cursor: pointer; filter: drop-shadow(5px 10px 5px rgba(0,0,0,0.4)); animation: idle 2s infinite alternate; }
        .agent-bot:hover { filter: drop-shadow(0 0 15px rgba(99,102,241,0.8)); transform: translateZ(0px) rotateZ(45deg) rotateX(-60deg) scale(1.1); z-index: 50 !important; }
        .agent-bot.active { filter: drop-shadow(0 0 20px rgba(16,185,129,1)); transform: translateZ(0px) rotateZ(45deg) rotateX(-60deg) scale(1.1); z-index: 50 !important; }
        @keyframes idle { 0% { transform: translateZ(0px) rotateZ(45deg) rotateX(-60deg) translateY(0); } 100% { transform: translateZ(0px) rotateZ(45deg) rotateX(-60deg) translateY(-5px); } }

        /* ชิ้นส่วน 2D Pixel Character */
        .pixel-char { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%) scale(1.5); width: 24px; height: 36px; }
        .p-head { position: absolute; top: 4px; left: 4px; width: 16px; height: 16px; background: #fcd34d; border: 2px solid #000; z-index: 3; border-radius: 2px; }
        .p-eyes { position: absolute; top: 6px; left: 3px; width: 2px; height: 2px; background: #000; box-shadow: 6px 0 0 #000; }
        .p-hair-m { position: absolute; top: -4px; left: -2px; width: 16px; height: 6px; background: #451a03; border: 2px solid #000; display: none; border-radius: 2px 2px 0 0; }
        .p-hair-f { position: absolute; top: -4px; left: -2px; width: 16px; height: 22px; background: #451a03; border: 2px solid #000; display: none; border-radius: 4px 4px 0 0; }
        .p-body { position: absolute; top: 18px; left: 4px; width: 16px; height: 12px; border: 2px solid #000; z-index: 2; border-radius: 2px; }
        .p-suit-shirt { position: absolute; top: 0; left: 4px; width: 4px; height: 8px; background: #fff; display: none; z-index: 2; }
        .p-suit-tie { position: absolute; top: 2px; left: 5px; width: 2px; height: 6px; background: #ef4444; display: none; z-index: 3; }
        .p-legs { position: absolute; top: 28px; left: 4px; width: 16px; height: 10px; background: #1e293b; border: 2px solid #000; z-index: 1; border-top: none; }
        .p-legs-gap { position: absolute; bottom: -2px; left: 4px; width: 4px; height: 6px; background: transparent; border: 2px solid #000; border-bottom: none; border-top: none; }

        /* Logic ควบคุมการแสดงผลตาม Class */
        .gender-MALE .p-hair-m { display: block; }
        .gender-FEMALE .p-hair-f { display: block; }
        .outfit-SUIT .p-body { background: #0f172a; } /* สูทสีดำ */
        .outfit-SUIT .p-suit-shirt, .outfit-SUIT .p-suit-tie { display: block; }
        .outfit-WORK .p-body { background: #3b82f6; } /* เสื้อช่าง/ฟ้า */
        .outfit-CASUAL .p-body { background: #10b981; } /* เสื้อลำลองเขียว */

        /* ป้ายชื่อและสถานะ */
        .agent-label { position: absolute; top: -15px; left: 50%; transform: translateX(-50%); background: rgba(15,23,42,0.8); border: 1px solid #475569; color: white; font-size: 10px; padding: 2px 6px; border-radius: 4px; white-space: nowrap; pointer-events: none; font-weight: bold; }
        .agent-bubble { position: absolute; top: -45px; left: 50%; transform: translateX(-50%); background: white; color: #0f172a; font-size: 12px; padding: 4px 8px; border-radius: 8px; white-space: nowrap; font-weight: bold; font-family: 'Prompt'; box-shadow: 0 4px 6px rgba(0,0,0,0.3); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .agent-bubble::after { content: ''; position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%); border-width: 5px 5px 0; border-style: solid; border-color: white transparent transparent transparent; }
        .agent-bot.working .agent-bubble { opacity: 1; animation: bounce 1s infinite; }
        @keyframes bounce { 0%, 100% { transform: translateX(-50%) translateY(0); } 50% { transform: translateX(-50%) translateY(-5px); } }

        /* 🌟 Terminal CSS */
        .terminal-scroll::-webkit-scrollbar { width: 8px; }
        .terminal-scroll::-webkit-scrollbar-track { background: #020617; }
        .terminal-scroll::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        .fade-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
        .scanline { width: 100%; height: 100px; background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(16,185,129,0.1) 50%, rgba(0,0,0,0) 100%); position: absolute; top: 0; left: 0; pointer-events: none; animation: scan 8s linear infinite; z-index: 50; }
        @keyframes scan { 0% { transform: translateY(-100px); } 100% { transform: translateY(100vh); } }
        .log-entry { animation: fadeIn 0.3s ease-out forwards; border-left: 2px solid #10b981; padding-left: 8px; margin-bottom: 8px; }
    </style>
</head>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwCut-_LOFpyERCvO2f_kc0MnaowZGZ6VafjwmCBY2sE4VSrDvLuDf-fuQmp5vI9naQ/exec';
        const WAREHOUSE_KEY = 'ADP_WAREHOUSE_CENTRAL';
        const WAREHOUSE_SUPPLIES_KEY = 'ADP_WAREHOUSE_SUPPLIES';

        // 🌟 State Management
        let dbMain = { main: [], withdrawals: [] };
        let dbSup = { ink: [], accessories: [], parts: [] };
        let allItems = []; 
        let withdrawTarget = null;

        // 🌟 Agent System
        const availableDesks = [
            { id: 1, x: 200, y: 200, occupied: false },
            { id: 2, x: 400, y: 200, occupied: false },
            { id: 3, x: 200, y: 500, occupied: false },
            { id: 4, x: 400, y: 500, occupied: false }
        ];
        let agents = [];
        let activeAgentId = null;

        const terminalOut = document.getElementById('terminalOutput');
        const terminalAction = document.getElementById('terminalAction');

        // ==========================================
        // 🌟 UI Functions
        // ==========================================
        function printLog(msg, type = 'info') {
            const div = document.createElement('div');
            let color = 'text-emerald-400';
            if (type === 'error') color = 'text-red-400';
            if (type === 'system') color = 'text-blue-400';
            if (type === 'bot') color = 'text-white';
            
            div.className = `log-entry ${color}`;
            div.innerHTML = type === 'bot' ? `[AGENT] ${msg}` : `<span class="opacity-50">${new Date().toLocaleTimeString('en-US', {hour12:false})}</span> ${msg}`;
            
            terminalOut.appendChild(div);
            terminalOut.scrollTop = terminalOut.scrollHeight;
        }

        function showOverlay(text) { document.getElementById('overlayText').innerText = text; document.getElementById('overlay').classList.remove('hidden'); document.getElementById('overlay').classList.add('flex'); }
        function hideOverlay() { document.getElementById('overlay').classList.add('hidden'); document.getElementById('overlay').classList.remove('flex'); }

        // ==========================================
        // 🌟 Drag Map Logic
        // ==========================================
        let isDragging = false, startX, startY, scrollLeft, scrollTop;
        const slider = document.getElementById('dragContainer');
        slider.addEventListener('mousedown', (e) => { isDragging = true; startX = e.pageX - slider.offsetLeft; startY = e.pageY - slider.offsetTop; scrollLeft = slider.scrollLeft; scrollTop = slider.scrollTop; });
        slider.addEventListener('mouseleave', () => { isDragging = false; });
        slider.addEventListener('mouseup', () => { isDragging = false; });
        slider.addEventListener('mousemove', (e) => { if (!isDragging) return; e.preventDefault(); const x = e.pageX - slider.offsetLeft; const y = e.pageY - slider.offsetTop; slider.scrollLeft = scrollLeft - (x - startX); slider.scrollTop = scrollTop - (y - startY); });
        
        function resetCamera() { slider.scrollTo({ top: 200, left: 200, behavior: 'smooth' }); }

        // ==========================================
        // 🌟 Database Logic
        // ==========================================
        // 🌟 โหลดข้อมูลจาก Google Sheet เมื่อเปิดเว็บ
        window.onload = async function() {
            setTimeout(resetCamera, 500); 
            try {
                const res = await fetch(`${API_URL}?key=ALL_DATA`);
                const result = await res.json();
                
                if (result.value) {
                    if(result.value[WAREHOUSE_KEY]) dbMain = JSON.parse(result.value[WAREHOUSE_KEY]);
                    if(result.value[WAREHOUSE_SUPPLIES_KEY]) dbSup = JSON.parse(result.value[WAREHOUSE_SUPPLIES_KEY]);
                    
                    // 🌟 ดึงข้อมูล Agents จากฐานข้อมูลมาแสดงผล
                    if(result.value['ADP_AGENTS_DB']) {
                        agents = JSON.parse(result.value['ADP_AGENTS_DB']);
                        agents.forEach(a => {
                            let desk = deskPositions.find(d => d.id === a.deskId);
                            if(desk) desk.occupied = true; // จองโต๊ะ
                            renderAgent(a); // วาดตัวละครลงห้อง
                        });
                        addLog(`Loaded ${agents.length} agents from database.`, 'system');
                    }

                    buildIndex();
                }
                
                let sysStatus = document.getElementById('sysStatus');
                sysStatus.className = "flex items-center gap-2 text-xs font-bold text-emerald-400";
                sysStatus.innerHTML = '<span class="w-2 h-2 rounded-full bg-emerald-400"></span> DB CONNECTED';
                printLog('Warehouse Database synchronized.', 'system');
                
            } catch (e) {
                document.getElementById('sysStatus').className = "flex items-center gap-2 text-xs font-bold text-red-500";
                document.getElementById('sysStatus').innerHTML = '<span class="w-2 h-2 rounded-full bg-red-500"></span> OFFLINE';
                printLog('Database connection failed!', 'error');
            }
        };

        function buildIndex() {
            allItems = [];
            if(dbMain.main) dbMain.main.forEach((r, idx) => { let sn = r[4]||''; if(sn && sn !== '-') allItems.push({ ref: 'MAIN', idx, type: r[1]||'', name: `${r[2]||''} ${r[3]||''}`.trim(), sn, status: r[5]||'', qty: 1, unit: 'เครื่อง' }); });
            if(dbSup.parts) dbSup.parts.forEach((r, idx) => { let qty = parseFloat(r[3]); if(!isNaN(qty)) allItems.push({ ref: 'PARTS', idx, type: 'อะไหล่', name: `${r[1]||''} ${r[2]||''}`.trim(), sn: '-', status: qty>0?'พร้อมจ่าย':'หมด', qty, unit: r[4]||'' }); });
            if(dbSup.accessories) dbSup.accessories.forEach((r, idx) => { let qty = parseFloat(r[4]); if(!isNaN(qty)) allItems.push({ ref: 'ACC', idx, type: 'อุปกรณ์', name: `${r[1]||''} ${r[2]||''}`.trim(), sn: r[3]||'-', status: qty>0?'พร้อมจ่าย':'หมด', qty, unit: r[5]||'' }); });
            if(dbSup.ink) dbSup.ink.forEach((r, idx) => { let qty = parseFloat(r[3]); if(!isNaN(qty)) allItems.push({ ref: 'INK', idx, type: 'หมึกพิมพ์', name: `${r[1]||''} (ใช้กับ: ${r[2]||''})`, sn: '-', status: qty>0?'พร้อมจ่าย':'หมด', qty, unit: r[4]||'' }); });
        }

        // ===================================================
        // 🌟 AGENT ENGINE (ระบบจ้างงาน เดิน และสั่งการ)
        // ===================================================
        
        function updatePreview() {
            let gender = document.getElementById('agentGender').value;
            let outfit = document.getElementById('agentOutfit').value;
            document.getElementById('previewChar').className = `pixel-char gender-${gender} outfit-${outfit}`;
        }

        function openHireModal() { 
            updatePreview(); 
            document.getElementById('hireModal').classList.remove('hidden');
            document.getElementById('hireModal').classList.add('flex');
        }
        
        function closeHireModal() { 
            document.getElementById('hireModal').classList.add('hidden');
            document.getElementById('hireModal').classList.remove('flex');
        }

        async function hireAgent() {
            // ดึงค่าให้ตรงกับ ID ในฟอร์ม
            let nameEl = document.getElementById('agentName');
            let name = (nameEl ? nameEl.value.trim() : '') || 'Agent-' + (agents.length + 1);
            
            let role = document.getElementById('agentRole').value;
            let gender = document.getElementById('agentGender').value;
            let outfit = document.getElementById('agentOutfit').value;

            let desk = deskPositions.find(d => !d.occupied);
            if(!desk) { alert("ที่นั่งออฟฟิศเต็มแล้วค่ะ!"); closeHireModal(); return; }

            desk.occupied = true;
            let id = Date.now();
            
            let agentObj = { id, name, role, gender, outfit, deskId: desk.id, homeX: desk.x, intentX: desk.x, homeY: desk.y, intentY: desk.y };
            agents.push(agentObj);

            renderAgent(agentObj);
            closeHireModal();
            addLog(`Hired new agent: "${name}" assigned to department.`, 'system');

            // สั่งให้เดินเข้าโต๊ะทำงาน (จุดเกิดคือเดินเข้ามาจากประตู ซ้ายสุด)
            moveAgent(id, desk.x + 28, desk.y - 15);
            
            // เคลียร์ค่า
            if (nameEl) nameEl.value = '';
            selectAgent(id);

            // 🌟 สั่งเซฟข้อมูล Agents ลง Google Sheet ทันทีที่จ้าง
            try {
                let updates = [{ key: 'ADP_AGENTS_DB', value: JSON.stringify(agents) }];
                let logs = [{ station: 'ระบบจัดการ AI', action: 'เพิ่ม Agent', detail: `จ้างบอทใหม่ชื่อ ${agentObj.name} (ตำแหน่ง: ${agentObj.role}) เข้าสู่ออฟฟิศ` }];
                await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'SYNC_ASSETS', updates: updates, logs: logs }) });
            } catch(e) {
                console.error("Save agent failed");
            }
        }

        // 🌟 ฟังก์ชันวาดตัวละครลงบนแผนผังออฟฟิศ
        function renderAgent(agent) {
            const layer = document.getElementById('characterLayer');
            if (!layer) return;

            // คำนวณ Z-index จากพิกัด Y ให้ตัวที่อยู่ล่างบังตัวที่อยู่ด้านบน
            let zIndex = agent.y + 10; 
            let color = agent.role === 'CHECKER' ? '#3b82f6' : (agent.role === 'RUNNER' ? '#f59e0b' : '#ec4899');

            let pixelHtml = `
                <div class="pixel-char gender-${agent.gender} outfit-${agent.outfit}">
                    <div class="p-head"><div class="p-hair-m"></div><div class="p-hair-f"></div><div class="p-eyes"></div></div>
                    <div class="p-body"><div class="p-suit-shirt"></div><div class="p-suit-tie"></div></div>
                    <div class="p-legs"><div class="p-legs-gap"></div></div>
                </div>
            `;

            let charHtml = `
            <div id="agent-${agent.id}" class="agent-avatar walking" style="left: 0px; top: 100px; pointer-events: auto; z-index: ${zIndex};" onclick="selectAgent(${agent.id}); event.stopPropagation();">
                <div class="select-ring"></div>
                <div class="bot-popup" id="pop-${agent.id}">Working...</div>
                ${pixelHtml}
                <div class="agent-label" style="border-color: ${color}; color: ${color};">${agent.name}</div>
            </div>`;
            
            layer.insertAdjacentHTML('beforeend', charHtml);
        }

        // 🌟 ฟังก์ชันสั่งให้ตัวละครขยับพิกัดเดินดุ๊กดิ๊กไปทำงาน
        function moveAgent(id, targetX, targetY, callback = null) {
            let el = document.getElementById(`agent-${id}`);
            let agent = agents.find(a => a.id === id);
            if(!el || !agent) return;

            el.classList.add('walking');
            el.style.left = targetX + 'px';
            el.style.top = targetY + 'px';

            setTimeout(() => {
                el.classList.remove('walking');
                if(callback) callback();
            }, 1000); // 1 วินาทีคือความเร็วในการเดิน
        }

        function activateAgent(id) {
            activeAgentId = id;
            let agent = agents.find(a => a.id === id);
            
            document.querySelectorAll('.agent-bot').forEach(b => b.classList.remove('active'));
            let el = document.getElementById(`agent-${id}`);
            if(el) el.classList.add('active');

            document.getElementById('activeAgentName').innerText = `${agent.name} [${agent.role}]`;
            document.getElementById('activeAgentName').className = `font-mono text-xs font-bold ${agent.role === 'CHECKER' ? 'text-blue-400' : (agent.role === 'RUNNER' ? 'text-amber-400' : 'text-pink-400')}`;

            printLog(`สวัสดีครับ! ผม ${agent.name} ยินดีรับคำสั่งครับ`, 'bot');

            buildTerminalUI(agent.role);
        }

        function triggerAgentAnim(text) {
            if(!activeAgentId) return;
            let el = document.getElementById(`agent-${activeAgentId}`);
            if(el) {
                let bubble = el.querySelector('.agent-bubble');
                bubble.innerText = text;
                el.classList.add('working');
                setTimeout(() => el.classList.remove('working'), 3000);
            }
        }

        // ==========================================
        // 🌟 Terminal UI & Tasks
        // ==========================================
        function buildTerminalUI(role) {
            if (role === 'CHECKER') {
                terminalAction.innerHTML = `
                    <div class="flex items-center gap-2 text-blue-400 mb-3"><span class="w-2 h-2 bg-blue-500 rounded-sm"></span> <span class="text-xs font-bold font-mono">STOCK CHECK SYSTEM</span></div>
                    <input type="text" id="termSearch" placeholder="Enter keyword or S/N..." class="w-full bg-[#020617] border border-blue-900/50 text-emerald-400 rounded p-3 text-sm outline-none focus:border-blue-500 font-mono mb-3" onkeypress="if(event.key==='Enter') taskSearch()">
                    <button onclick="taskSearch()" class="w-full bg-blue-900/40 hover:bg-blue-600 text-blue-200 font-mono py-2 border border-blue-800 rounded transition-colors text-sm">EXECUTE SEARCH</button>
                `;
                setTimeout(() => document.getElementById('termSearch').focus(), 100);
            } 
            else if (role === 'RUNNER') {
                terminalAction.innerHTML = `
                    <div class="flex items-center gap-2 text-amber-400 mb-2"><span class="w-2 h-2 bg-amber-500 rounded-sm"></span> <span class="text-xs font-bold font-mono">WITHDRAW PROTOCOL</span></div>
                    <input type="text" id="termFilter" placeholder="Search item to withdraw..." class="w-full bg-[#020617] border border-amber-900/50 text-emerald-400 rounded p-2 text-sm outline-none focus:border-amber-500 font-mono mb-2" oninput="taskFilter()">
                    <div id="termList" class="flex-1 overflow-y-auto custom-scrollbar flex flex-col gap-1 mb-2 max-h-[100px] border border-slate-800 bg-[#020617] p-1 rounded"></div>
                `;
                taskFilter(); 
            }
            else if (role === 'REPORTER') {
                terminalAction.innerHTML = `
                    <div class="flex items-center gap-2 text-pink-400 mb-3"><span class="w-2 h-2 bg-pink-500 rounded-sm"></span> <span class="text-xs font-bold font-mono">DATA EXPORT ROUTINE</span></div>
                    <select id="termCat" class="w-full bg-[#020617] border border-pink-900/50 text-emerald-400 rounded p-3 text-sm outline-none focus:border-pink-500 font-mono mb-4 cursor-pointer">
                        <option value="ALL">EXPORT_ALL_DATA</option>
                        <option value="LOW">EXPORT_LOW_STOCK_WARNING</option>
                        <option value="MAIN">EXPORT_MAIN_EQUIPMENT</option>
                        <option value="PARTS">EXPORT_PARTS_AND_ACC</option>
                    </select>
                    <button onclick="taskExport()" class="w-full bg-pink-900/40 hover:bg-pink-600 text-pink-200 font-mono py-3 border border-pink-800 rounded transition-colors text-sm">GENERATE EXCEL</button>
                `;
            }
        }

        // --- Role: Checker ---
        function taskSearch() {
            let q = document.getElementById('termSearch').value.toLowerCase().trim();
            if(!q) return;
            triggerAgentAnim('Checking...');
            printLog(`Processing query: "${q}"...`, 'system');
            
            let matches = allItems.filter(i => i.name.toLowerCase().includes(q) || i.sn.toLowerCase().includes(q) || i.type.toLowerCase().includes(q));
            
            if(matches.length === 0) {
                printLog(`No records found for "${q}".`, 'bot');
            } else {
                matches.sort((a,b) => b.qty - a.qty);
                let html = `Found ${matches.length} records:<br>`;
                matches.slice(0, 10).forEach(m => {
                    let color = m.qty <= 0 ? 'text-red-500' : 'text-emerald-500';
                    html += `<span class="text-blue-400">[${m.type}]</span> ${m.name} | S/N: ${m.sn} | QTY: <span class="${color}">${m.qty}</span><br>`;
                });
                if(matches.length > 10) html += `...and ${matches.length - 10} more.`;
                printLog(html, 'bot');
            }
            document.getElementById('termSearch').value = '';
        }

        // --- Role: Runner ---
        function taskFilter() {
            let q = document.getElementById('termFilter').value.toLowerCase().trim();
            let list = document.getElementById('termList');
            let matches = allItems.filter(i => i.qty > 0 && (i.name.toLowerCase().includes(q) || i.sn.toLowerCase().includes(q)));
            
            if(matches.length === 0) { list.innerHTML = '<div class="text-slate-600 text-center text-xs mt-2 font-mono">NO ITEMS MATCHED</div>'; return; }

            let html = '';
            matches.slice(0, 15).forEach(m => {
                let safeName = String(m.name).replace(/'/g, "\\'");
                html += `
                <div class="bg-slate-800/50 hover:bg-amber-900/30 p-2 rounded cursor-pointer border border-slate-700/50 flex justify-between items-center text-xs font-mono" 
                     onclick="openWithdrawForm('${m.ref}', ${m.idx}, '${safeName}', ${m.qty}, '${m.unit}')">
                    <div class="truncate text-slate-300 w-3/4">${m.name}</div>
                    <div class="text-amber-400 shrink-0">QTY: ${m.qty}</div>
                </div>`;
            });
            list.innerHTML = html;
        }

        function openWithdrawForm(ref, idx, name, maxQty, unit) {
            terminalAction.innerHTML = `
                <div class="flex items-center justify-between mb-2 text-amber-400 font-mono text-xs font-bold border-b border-amber-900/50 pb-1">
                    <span>> TARGET: ${name.substring(0,20)}...</span>
                    <button onclick="buildTerminalUI('RUNNER')" class="text-slate-500 hover:text-white">[CANCEL]</button>
                </div>
                <div class="flex gap-2 mb-2 font-mono text-xs">
                    <div class="w-1/3 text-slate-400">QTY (Max ${maxQty}):</div>
                    <input type="number" id="wQty" min="1" max="${maxQty}" value="1" class="w-2/3 bg-[#020617] border border-slate-700 text-white rounded p-1 outline-none text-center">
                </div>
                <div class="flex gap-2 mb-3 font-mono text-xs">
                    <div class="w-1/3 text-slate-400">RECEIVER:</div>
                    <input type="text" id="wUser" placeholder="Enter name..." class="w-2/3 bg-[#020617] border border-slate-700 text-emerald-400 rounded p-1 outline-none">
                </div>
                <button onclick="submitWithdraw('${ref}', ${idx}, '${name}', ${maxQty}, '${unit}')" class="w-full bg-amber-600 hover:bg-amber-500 text-white font-mono font-bold py-2 rounded shadow text-sm">CONFIRM DEDUCT</button>
            `;
        }

        async function submitWithdraw(ref, idx, name, maxQty, unit) {
            let qty = parseFloat(document.getElementById('wQty').value);
            let user = document.getElementById('wUser').value.trim();

            if(!qty || qty <= 0 || qty > maxQty) { printLog('ERR: Invalid Quantity.', 'error'); return; }
            if(!user) { printLog('ERR: Receiver name required.', 'error'); return; }

            triggerAgentAnim('Running!');
            showOverlay('SYNCING DATABASE...');
            printLog(`Executing withdraw protocol...`, 'system');

            try {
                let newQty = maxQty - qty;
                if (ref === 'MAIN') {
                    dbMain.main[idx][5] = 'จ่ายแล้ว';
                    dbMain.main[idx][7] = String(dbMain.main[idx][7]||'') + ` [จ่ายให้: ${user}]`;
                } else if (ref === 'PARTS') { dbSup.parts[idx][3] = newQty; }
                else if (ref === 'ACC') { dbSup.accessories[idx][4] = newQty; }
                else if (ref === 'INK') { dbSup.ink[idx][3] = newQty; }

                let todayStr = new Date().toLocaleDateString('th-TH', { year:'numeric', month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
                dbMain.withdrawals = dbMain.withdrawals || [];
                dbMain.withdrawals.push({ date: todayStr, action: 'เบิกจ่าย', category: ref, specs: name, user: user, qty: qty, unit: unit, sn: ref==='MAIN'?dbMain.main[idx][4]:null });

                let updates = [];
                if (ref === 'MAIN') updates.push({ key: WAREHOUSE_KEY, value: JSON.stringify(dbMain) });
                else updates.push({ key: WAREHOUSE_SUPPLIES_KEY, value: JSON.stringify(dbSup) }, { key: WAREHOUSE_KEY, value: JSON.stringify(dbMain) });

                let logs = [{ station: 'คลังส่วนกลาง', action: 'เบิกจ่าย(Agent)', detail: `[เบิก] ${name} จำนวน ${qty} โดย ${user}` }];

                let response = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'SYNC_ASSETS', updates: updates, logs: logs }) });
                let resJson = await response.json();
                if(resJson.status !== 'success') throw new Error("API Error");

                buildIndex(); 
                hideOverlay();
                printLog(`Success. ${qty}x ${name} deducted. Remaining: ${newQty}.`, 'bot');
                buildTerminalUI('RUNNER');

            } catch (e) {
                hideOverlay();
                printLog(`TRANSACTION FAILED. Connection error.`, 'error');
            }
        }

        // --- Role: Reporter ---
        async function taskExport() {
            let filter = document.getElementById('termCat').value;
            triggerAgentAnim('Compiling...');
            printLog(`Compiling Data Matrix [${filter}]...`, 'system');
            showOverlay('GENERATING EXCEL...');

            try {
                let reportData = [];

                if (filter === 'ALL' || filter === 'MAIN' || filter === 'LOW') {
                    let groups = {};
                    if(dbMain.main) dbMain.main.forEach(r => {
                        let type = String(r[1]||'').trim(); let brand = String(r[2]||'').trim(); let model = String(r[3]||'').trim(); let status = String(r[5]||'').trim();
                        let key = `${type}|${brand}|${model}`;
                        if (!groups[key]) groups[key] = { cat: 'MAIN', type: type, detail: `${brand} ${model}`.trim() || '-', qty: 0, unit: 'EA' };
                        if (status.includes('ว่าง') || status.includes('พร้อมจ่าย')) groups[key].qty++;
                    });
                    reportData.push(...Object.values(groups));
                }

                if (filter === 'ALL' || filter === 'PARTS' || filter === 'LOW') {
                    if(dbSup.parts) dbSup.parts.forEach(r => { let qty = parseFloat(r[3]); if(!isNaN(qty)) reportData.push({ cat: 'PARTS', type: r[1]||'-', detail: r[2]||'-', qty: qty, unit: r[4]||'EA' }); });
                    if(dbSup.accessories) dbSup.accessories.forEach(r => { let qty = parseFloat(r[4]); if(!isNaN(qty)) reportData.push({ cat: 'ACCESSORY', type: r[1]||'-', detail: r[2]||'-', qty: qty, unit: r[5]||'EA' }); });
                }

                if (filter === 'ALL' || filter === 'INK' || filter === 'LOW') {
                    if(dbSup.ink) dbSup.ink.forEach(r => { let qty = parseFloat(r[3]); if(!isNaN(qty)) reportData.push({ cat: 'INK', type: r[1]||'-', detail: `For: ${r[2]||'-'}`, qty: qty, unit: r[4]||'EA' }); });
                }

                if (filter === 'LOW') reportData = reportData.filter(i => i.qty <= 5).sort((a, b) => a.qty - b.qty);
                else reportData.sort((a, b) => a.cat.localeCompare(b.cat) || a.type.localeCompare(b.type));

                if(reportData.length === 0) {
                    hideOverlay(); printLog(`Query returned 0 results.`, 'bot'); return;
                }

                const wb = new ExcelJS.Workbook(); const ws = wb.addWorksheet('Data');
                ws.addRow(['CATEGORY', 'TYPE', 'DETAIL', 'QTY', 'UNIT']);
                reportData.forEach(item => ws.addRow([item.cat, item.type, item.detail, item.qty, item.unit]));

                const buffer = await wb.xlsx.writeBuffer();
                let dateStr = new Date().getTime();
                saveAs(new Blob([buffer]), `ADP_AGENT_${filter}_${dateStr}.xlsx`);

                hideOverlay();
                printLog(`File ADP_AGENT_${filter}_${dateStr}.xlsx downloaded.`, 'bot');

            } catch (e) {
                hideOverlay();
                printLog(`EXPORT FAILED: ${e.message}`, 'error');
            }
        }

    </script>
</body>
</html>
