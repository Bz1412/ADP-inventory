<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Sims: AI Agent Office</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1a1a2e;
            font-family: 'Press Start 2P', cursive;
            display: flex;
            height: 100vh;
            color: white;
            overflow: hidden;
        }

        /* === แถบตกแต่ง (Inventory) ด้านซ้าย === */
        .inventory-panel {
            width: 200px;
            background: #2b2b2b;
            border-right: 4px solid #555;
            padding: 10px;
            overflow-y: auto;
            box-sizing: border-box;
        }
        .inventory-title {
            font-size: 10px;
            color: #f1c40f;
            text-align: center;
            margin-bottom: 15px;
            border-bottom: 2px dashed #f1c40f;
            padding-bottom: 10px;
        }
        .item-box {
            background: #111;
            border: 2px solid #444;
            margin-bottom: 10px;
            padding: 10px;
            text-align: center;
            cursor: grab; /* เปลี่ยนเมาส์เป็นมือจับ */
            transition: 0.2s;
        }
        .item-box:hover { border-color: #f1c40f; background: #222; }
        .item-box img {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
            pointer-events: none; /* ป้องกันบั๊กลากภาพของเบราว์เซอร์ */
        }
        .item-name { font-size: 7px; margin-top: 5px; color: #aaa; }

        /* === พื้นที่ห้อง (The Room) === */
        .room-viewport {
            flex: 1;
            position: relative;
            background-color: #5d4037; /* สีพื้นไม้ */
            background-image: 
                linear-gradient(90deg, rgba(0,0,0,0.1) 1px, transparent 1px),
                linear-gradient(rgba(0,0,0,0.1) 1px, transparent 1px);
            background-size: 40px 40px; /* เส้นกริดช่วยให้วางของตรง */
            overflow: hidden;
        }

        /* กำแพงด้านบน */
        .wall-top {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 30%;
            background: #8d6e63;
            border-bottom: 6px solid #4e342e;
            z-index: 0;
        }

        /* ของตกแต่งที่ลากมาวาง */
        .placed-item {
            position: absolute;
            cursor: move; /* เปลี่ยนเมาส์เป็นลูกศรย้าย */
            image-rendering: pixelated;
            transition: filter 0.1s;
        }
        .placed-item:hover {
            filter: drop-shadow(0 0 4px #f1c40f); /* เรืองแสงเหลืองเมื่อชี้ */
        }
        .placed-item img {
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* ปุ่มลบของ (X) */
        .delete-btn {
            position: absolute;
            top: -10px; right: -10px;
            background: #e74c3c;
            color: white;
            border: 2px solid #c0392b;
            border-radius: 50%;
            width: 20px; height: 20px;
            font-size: 10px;
            text-align: center;
            line-height: 16px;
            cursor: pointer;
            display: none; /* ซ่อนไว้ แสดงเมื่อ hover */
            z-index: 999;
        }
        .placed-item:hover .delete-btn { display: block; }

        /* === ปุ่ม Save === */
        .save-btn {
            position: absolute;
            bottom: 20px; right: 20px;
            font-family: 'Press Start 2P', cursive;
            font-size: 10px;
            background: #27ae60;
            color: white;
            border: 3px solid #2ecc71;
            padding: 10px 15px;
            cursor: pointer;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
            z-index: 999;
        }
        .save-btn:hover { background: #2ecc71; }

    </style>
</head>
<body>

    <!-- แถบไอเทมด้านซ้าย -->
    <div class="inventory-panel">
        <div class="inventory-title">🛋️ FURNITURE</div>
        
        <!-- ไอเทมตัวอย่าง (เปลี่ยน Link ภาพเป็นของคุณเอง) -->
        <div class="item-box" draggable="true" data-type="desk" data-w="120" data-h="80">
            <img src="https://via.placeholder.com/48/8B4513/FFFFFF?text=Desk" alt="Desk">
            <div class="item-name">โต๊ะทำงาน</div>
        </div>
        <div class="item-box" draggable="true" data-type="pc" data-w="60" data-h="80">
            <img src="https://via.placeholder.com/48/2C3E50/FFFFFF?text=PC" alt="PC">
            <div class="item-name">คอมพิวเตอร์</div>
        </div>
        <div class="item-box" draggable="true" data-type="sofa" data-w="150" data-h="80">
            <img src="https://via.placeholder.com/48/9B59B6/FFFFFF?text=Sofa" alt="Sofa">
            <div class="item-name">โซฟา</div>
        </div>
        <div class="item-box" draggable="true" data-type="plant" data-w="40" data-h="60">
            <img src="https://via.placeholder.com/48/27AE60/FFFFFF?text=Plant" alt="Plant">
            <div class="item-name">ต้นไม้</div>
        </div>
        <div class="item-box" draggable="true" data-type="agent1" data-w="40" data-h="70">
            <img src="https://via.placeholder.com/48/E67E22/FFFFFF?text=Bot" alt="Agent">
            <div class="item-name">AI Agent</div>
        </div>
    </div>

    <!-- พื้นที่ห้อง -->
    <div class="room-viewport" id="room">
        <div class="wall-top"></div>
        
        <button class="save-btn" onclick="saveRoomLayout()">💾 SAVE ROOM</button>
    </div>

<script>
    const room = document.getElementById('room');
    let currentDragItem = null; // ไอเทมที่กำลังลากอยู่
    let offsetX = 0, offsetY = 0;
    let isDraggingFromInventory = false;

    // ข้อมูลภาพประกอบ (เปลี่ยน URL เป็นไฟล์ PNG จริงของคุณ)
    const itemImages = {
        desk: "https://via.placeholder.com/120x80/8B4513/FFFFFF?text=Desk",
        pc: "https://via.placeholder.com/60x80/2C3E50/FFFFFF?text=PC",
        sofa: "https://via.placeholder.com/150x80/9B59B6/FFFFFF?text=Sofa",
        plant: "https://via.placeholder.com/40x60/27AE60/FFFFFF?text=Plant",
        agent1: "https://via.placeholder.com/40x70/E67E22/FFFFFF?text=Bot"
    };

    // 1. จับการลากจาก Inventory (Sidebar)
    document.querySelectorAll('.item-box').forEach(box => {
        box.addEventListener('mousedown', (e) => {
            isDraggingFromInventory = true;
            const type = box.getAttribute('data-type');
            const w = parseInt(box.getAttribute('data-w'));
            const h = parseInt(box.getAttribute('data-h'));
            
            // สร้างโคลนมาวางบน Mouse ชั่วคราว
            createItem(type, w, h, e.clientX, e.clientY, true);
        });
    });

    // 2. ฟังก์ชันสร้างไอเทมลงในห้อง
    function createItem(type, w, h, x, y, isTemp = false) {
        const item = document.createElement('div');
        item.className = 'placed-item';
        item.style.width = w + 'px';
        item.style.height = h + 'px';
        item.dataset.type = type;

        // คำนวณตำแหน่งให้ตรงกลางเมาส์
        const roomRect = room.getBoundingClientRect();
        item.style.left = (x - roomRect.left - w/2) + 'px';
        item.style.top = (y - roomRect.top - h/2) + 'px';

        item.innerHTML = `
            <img src="${itemImages[type]}" alt="${type}">
            <div class="delete-btn" onclick="this.parentElement.remove()">X</div>
        `;

        // Auto Z-Index (เหมือน The Sims) ยิ่งอยู่ล่างซ้าย ยิ่งบังของด้านบนขวา
        updateZIndex(item);

        // เริ่มลาก
        currentDragItem = item;
        offsetX = w / 2;
        offsetY = h / 2;

        room.appendChild(item);
    }

    // 3. จับการลากของที่อยู่ในห้องอยู่แล้ว
    room.addEventListener('mousedown', (e) => {
        if (e.target.parentElement.classList.contains('placed-item') && !e.target.classList.contains('delete-btn')) {
            isDraggingFromInventory = false;
            currentDragItem = e.target.parentElement;
            
            const rect = currentDragItem.getBoundingClientRect();
            const roomRect = room.getBoundingClientRect();
            
            offsetX = e.clientX - rect.left;
            offsetY = e.clientY - rect.top;
            
            updateZIndex(currentDragItem); // อัปเดตชั้นความสูง
        }
    });

    // 4. ขยับเมาส์
    document.addEventListener('mousemove', (e) => {
        if (!currentDragItem) return;

        const roomRect = room.getBoundingClientRect();
        let newX = e.clientX - roomRect.left - offsetX;
        let newY = e.clientY - roomRect.top - offsetY;

        // ล็อกไม่ให้ลากออกนอกกล่อง
        newX = Math.max(0, Math.min(newX, roomRect.width - currentDragItem.offsetWidth));
        newY = Math.max(0, Math.min(newY, roomRect.height - currentDragItem.offsetHeight));

        currentDragItem.style.left = newX + 'px';
        currentDragItem.style.top = newY + 'px';
    });

    // 5. ปล่อยเมาส์
    document.addEventListener('mouseup', () => {
        currentDragItem = null;
    });

    // ฟังก์ชันอัปเดต Z-index (ให้ของที่อยู่ใต้สุดของจอ บังของด้านบนได้)
    function updateZIndex(item) {
        const top = parseInt(item.style.top);
        const left = parseInt(item.style.left);
        // ยิ่งอยู่ล่าง (top มาก) และซ้าย (left น้อย) z-index ยิ่งสูง
        item.style.zIndex = Math.floor(top) + Math.floor(1000 - left);
    }

    // ==========================================
    // 🌟 ระบบ Save/Load ส่งไปยัง Google Apps Script
    // ==========================================
    const API_URL = 'https://script.google.com/macros/s/AKfycbwCut-_LOFpyERCvO2f_kc0MnaowZGZ6VafjwmCBY2sE4VSrDvLuDf-fuQmp5vI9naQ/exec'; // เปลี่ยนลิงก์ตรงนี้

    // บันทึกข้อมูลห้อง
    async function saveRoomLayout() {
        const items = document.querySelectorAll('.placed-item');
        const layoutData = [];

        items.forEach(item => {
            layoutData.push({
                type: item.dataset.type,
                x: item.style.left,
                y: item.style.top,
                z: item.style.zIndex
            });
        });

        // ส่งข้อมูลไป Backend
        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain' },
                body: JSON.stringify({
                    action: 'SAVE_OFFICE_LAYOUT',
                    key: 'ADP_OFFICE_LAYOUT',
                    value: JSON.stringify(layoutData)
                })
            });
            const data = await res.json();
            if(data.status === 'success') alert('💾 บันทึกห้องสำเร็จ!');
        } catch (e) {
            alert('❌ บันทึกไม่สำเร็จ กรุณาตรวจสอบ API_URL');
        }
    }

    // โหลดข้อมูลห้องตอนเปิดเว็บ
    async function loadRoomLayout() {
        try {
            const res = await fetch(`${API_URL}?key=ADP_OFFICE_LAYOUT`);
            const data = await res.json();
            
            if (data.value) {
                const layoutData = JSON.parse(data.value);
                layoutData.forEach(item => {
                    // ดึงขนาด w,h จาก data-type (ต้องเขียนเพิ่มใน itemImages หรือโหลดมาจาก DB ด้วย)
                    // ตัวอย่างนี้สมมติว่าดึงมาได้
                    const fakeW = 80; 
                    const fakeH = 80;
                    
                    const el = document.createElement('div');
                    el.className = 'placed-item';
                    el.dataset.type = item.type;
                    el.style.left = item.x;
                    el.style.top = item.y;
                    el.style.zIndex = item.z;
                    el.style.width = fakeW + 'px'; // ปรับตามโลจิกของคุณ
                    el.style.height = fakeH + 'px';
                    el.innerHTML = `
                        <img src="${itemImages[item.type]}" alt="${item.type}">
                        <div class="delete-btn" onclick="this.parentElement.remove()">X</div>
                    `;
                    room.appendChild(el);
                });
            }
        } catch (e) {
            console.log("No saved layout or API error");
        }
    }

    // เรียกโหลดห้องตอนเริ่มต้น
    // loadRoomLayout(); // เปิดใช้เมื่อคุณใส่ API_URL แล้ว

</script>
</body>
</html>
