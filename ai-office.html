<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIXEL AGENTS - ADP Office</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    :root {
      --pixel-border: 4px solid #000;
      --bg-color: #1a1c2c;
      --panel-bg: #333c57;
      --room-bg: #5f574f;
      --accent-green: #38b764;
      --accent-purple: #5d275d;
      --accent-blue: #29adff;
      --accent-yellow: #ffcd75;
      --terminal-bg: #1d2b53;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
    
    body { 
      font-family: 'Press Start 2P', cursive; 
      background-color: var(--bg-color); 
      color: #fff; 
      image-rendering: pixelated;
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Header */
    .header {
      background-color: var(--panel-bg);
      border-bottom: var(--pixel-border);
      padding: 15px;
      text-align: center;
      font-size: 18px;
      color: var(--accent-yellow);
      text-shadow: 3px 3px 0px #000;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 15px;
    }
    .header span { color: var(--accent-blue); }

    /* Main Layout */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .workspace {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* Office Room (Grid) */
    .office-room {
      flex: 3;
      background-color: var(--room-bg);
      position: relative;
      overflow: hidden;
      border-right: var(--pixel-border);
      cursor: default;
    }

    /* พื้นห้องแบบ Grid Tile */
    .room-tile {
      width: 100%;
      height: 100%;
      position: absolute;
      background-image: 
        linear-gradient(to right, rgba(0,0,0,0.1) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0,0,0,0.1) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* กล่องข้อความระหว่างวางของ */
    .placing-indicator {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--accent-purple);
      padding: 8px 15px;
      font-size: 10px;
      border: var(--pixel-border);
      box-shadow: 4px 4px 0px #000;
      z-index: 100;
      display: none;
      animation: blink 1s infinite;
    }
    @keyframes blink { 50% { opacity: 0.7; } }

    /* Pixel Items & Agents */
    .pixel-entity {
      position: absolute;
      width: 48px;
      height: 48px;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
    }

    .sprite-box {
      width: 40px;
      height: 40px;
      background: rgba(0,0,0,0.2);
      border: 2px solid rgba(0,0,0,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      box-shadow: 2px 2px 0px rgba(0,0,0,0.3);
    }

    .entity-name {
      font-size: 6px;
      background: #000;
      color: #fff;
      padding: 2px;
      width: 100%;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: -2px;
    }

    .pixel-entity.agent .sprite-box {
      border-color: var(--accent-green);
      background: rgba(56, 183, 100, 0.2);
    }
    
    .pixel-entity.agent .sprite-box {
      animation: idle-bounce 1s infinite alternate;
    }

    @keyframes idle-bounce {
      from { transform: translateY(0); }
      to { transform: translateY(-2px); }
    }

    /* Side Panel */
    .side-panel {
      flex: 1;
      background-color: var(--panel-bg);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }

    .panel-section {
      padding: 15px;
      border-bottom: var(--pixel-border);
    }

    .panel-title {
      font-size: 10px;
      color: var(--accent-yellow);
      margin-bottom: 15px;
      text-align: center;
      text-shadow: 2px 2px 0px #000;
    }

    /* Shop Items Grid */
    .shop-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .shop-item {
      background: #262b40;
      border: var(--pixel-border);
      padding: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      box-shadow: 3px 3px 0px #000;
      transition: transform 0.1s;
    }
    .shop-item:hover { transform: translate(1px, 1px); box-shadow: 2px 2px 0px #000; }
    .shop-item.active { border-color: var(--accent-green); background: rgba(56, 183, 100, 0.2); }
    .shop-item .icon { font-size: 20px; margin-bottom: 5px; }
    .shop-item .name { font-size: 7px; text-align: center; }

    /* Agent Creator */
    .form-group { margin-bottom: 12px; }
    .form-group label { 
      font-size: 8px; 
      display: block; 
      margin-bottom: 6px; 
      color: var(--accent-blue);
    }
    .form-input {
      width: 100%;
      padding: 8px;
      font-family: 'Press Start 2P', cursive;
      font-size: 8px;
      background: #1a1c2c;
      color: #fff;
      border: var(--pixel-border);
      box-shadow: inset 2px 2px 0px #000;
    }
    .form-input:focus { outline: none; border-color: var(--accent-blue); }

    .pixel-btn {
      width: 100%;
      background-color: var(--accent-purple);
      color: #fff;
      border: var(--pixel-border);
      padding: 10px;
      font-family: 'Press Start 2P', cursive;
      font-size: 9px;
      cursor: pointer;
      box-shadow: 4px 4px 0px #000;
      transition: transform 0.1s;
      text-shadow: 1px 1px 0px #000;
    }
    .pixel-btn:hover { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
    .pixel-btn.green { background-color: var(--accent-green); }

    /* Terminal Bottom Bar */
    .terminal-bar {
      height: 150px;
      background-color: var(--terminal-bg);
      border-top: var(--pixel-border);
      display: flex;
      flex-direction: column;
    }

    .terminal-header {
      background: #000;
      color: var(--accent-green);
      padding: 5px 15px;
      font-size: 8px;
      display: flex;
      justify-content: space-between;
      border-bottom: 2px solid #333;
    }

    .terminal-content {
      flex: 1;
      padding: 10px 15px;
      color: var(--accent-green);
      font-size: 8px;
      overflow-y: auto;
      line-height: 1.6;
    }

    .terminal-content .log-agent { color: var(--accent-yellow); }
    .terminal-content .log-system { color: var(--accent-blue); }
    .terminal-content .log-error { color: #ff004d; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #1a1c2c; }
    ::-webkit-scrollbar-thumb { background: #333c57; border: 1px solid #000; }

    .placing-mode { cursor: crosshair !important; }
  </style>
</head>
<body>

  <div class="header">
    PIXEL <span>AGENTS</span> OFFICE
  </div>

  <div class="main-container">
    <div class="workspace">
      
      <!-- Office Room -->
      <div class="office-room" id="officeRoom" onclick="placeEntity(event)">
        <div class="room-tile"></div>
        <div class="placing-indicator" id="placingIndicator">กำลังวาง: คลิกที่พื้นห้อง...</div>
      </div>

      <!-- Side Panel -->
      <div class="side-panel">
        
        <!-- ร้านของตกแต่ง -->
        <div class="panel-section">
          <div class="panel-title">🛒 ร้านของตกแต่ง</div>
          <div class="shop-grid" id="shopGrid">
            <!-- Items will be injected by JS -->
          </div>
        </div>

        <!-- สร้าง Agent -->
        <div class="panel-section">
          <div class="panel-title">🤖 สร้าง AI Agent</div>
          <div class="form-group">
            <label>NAME</label>
            <input type="text" id="agentName" class="form-input" placeholder="ชื่อ Agent">
          </div>
          <div class="form-group">
            <label>CLASS / ROLE</label>
            <select id="agentRole" class="form-input">
              <option value="monitor">🕵️ ตรวจสอบสต็อก</option>
              <option value="report">🧙 ทำรายงานเดือน</option>
              <option value="fix">🔧 แจ้งเตือนชำรุด</option>
            </select>
          </div>
          <button class="pixel-btn green" onclick="hireAgent()">DEPLOY AGENT</button>
        </div>

        <!-- Action Buttons -->
        <div class="panel-section" style="border-bottom: none; margin-top: auto;">
          <button class="pixel-btn" onclick="saveOfficeState()" style="margin-bottom: 10px;">💾 SYNC TO CLOUD</button>
          <button class="pixel-btn" onclick="clearRoom()" style="background-color: #ff004d;">🗑️ RESET ROOM</button>
        </div>

      </div>
    </div>

    <!-- Terminal Log -->
    <div class="terminal-bar">
      <div class="terminal-header">
        <span>CLAUDE CODE TERMINAL v1.0</span>
        <span id="agentCount">AGENTS: 0</span>
      </div>
      <div class="terminal-content" id="terminalLog">
        > System Initialized...<br>
        > Connecting to ADP Backend...<br>
        <span class="log-system">> [STATUS] Office Ready for customization.</span><br>
      </div>
    </div>
  </div>

  <script>
    // ==========================================
    // CONFIG & STATE
    // ==========================================
    const BACKEND_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL'; // ใส่ URL ของคุณที่นี่
    
    let officeState = { items: [], agents: [] };
    let isPlacing = false;
    let currentTool = null;

    // รายการของตกแต่งในร้าน
    const shopItems = [
      { id: 'desk', sprite: '🖥️', name: 'โต๊ะ+จอ' },
      { id: 'plant', sprite: '🪴', name: 'ต้นไม้' },
      { id: 'coffee', sprite: '☕', name: 'กาแฟ' },
      { id: 'shelf', sprite: '📚', name: 'ชั้นหนังสือ' },
      { id: 'cabinet', sprite: '🗄️', name: 'ตู้เอกสาร' },
      { id: 'server', sprite: '💽', name: 'แม่ข่าย' },
    ];

    const agentSprites = {
      monitor: '🕵️',
      report: '🧙',
      fix: '🔧'
    };

    // ==========================================
    // INITIALIZATION
    // ==========================================
    window.onload = () => {
      renderShop();
      // loadOfficeState(); // เปิดใช้เมื่อใส่ URL แล้ว
    };

    function renderShop() {
      const grid = document.getElementById('shopGrid');
      grid.innerHTML = '';
      shopItems.forEach(item => {
        const el = document.createElement('div');
        el.className = 'shop-item';
        el.id = 'shop_' + item.id;
        el.onclick = () => selectTool(item);
        el.innerHTML = `
          <div class="icon">${item.sprite}</div>
          <div class="name">${item.name}</div>
        `;
        grid.appendChild(el);
      });
    }

    // ==========================================
    // OFFICE ROOM LOGIC (PLACEMENT)
    // ==========================================
    function selectTool(item) {
      // ถ้ากดซ้ำให้ยกเลิก
      if (currentTool && currentTool.id === item.id) {
        cancelPlacement();
        return;
      }

      isPlacing = true;
      currentTool = item;
      
      document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('active'));
      document.getElementById('shop_' + item.id).classList.add('active');
      document.getElementById('officeRoom').classList.add('placing-mode');
      document.getElementById('placingIndicator').style.display = 'block';
      document.getElementById('placingIndicator').innerText = `กำลังวาง: ${item.name}`;
    }

    function cancelPlacement() {
      isPlacing = false;
      currentTool = null;
      document.querySelectorAll('.shop-item').forEach(el => el.classList.remove('active'));
      document.getElementById('officeRoom').classList.remove('placing-mode');
      document.getElementById('placingIndicator').style.display = 'none';
    }

    function placeEntity(event) {
      if (!isPlacing || !currentTool) return;

      const room = document.getElementById('officeRoom');
      const rect = room.getBoundingClientRect();
      
      // คำนวณตำแหน่งแบบ Grid (48x48 px)
      const x = Math.floor((event.clientX - rect.left) / 48) * 48;
      const y = Math.floor((event.clientY - rect.top) / 48) * 48;

      // ป้องกันการวางซ้อนที่เดิม
      const isOccupied = officeState.items.some(i => i.x === x && i.y === y) || 
                         officeState.agents.some(a => a.x === x && a.y === y);
      if (isOccupied) {
        addLog(`> <span class="log-error">[ERROR] ช่องนี้มีของอยู่แล้ว!</span>`);
        return;
      }

      const newId = 'item_' + Date.now();
      const newItem = {
        id: newId,
        type: currentTool.id,
        sprite: currentTool.sprite,
        name: currentTool.name,
        x: x,
        y: y
      };

      officeState.items.push(newItem);
      renderEntity(newItem, false);
      
      addLog(`> <span class="log-system">[SYSTEM] วาง ${currentTool.name} ที่พิกัด [${x/48}, ${y/48}]</span>`);
      cancelPlacement();
    }

    function renderEntity(data, isAgent) {
      const room = document.getElementById('officeRoom');
      const el = document.createElement('div');
      el.className = `pixel-entity ${isAgent ? 'agent' : ''}`;
      el.style.left = data.x + 'px';
      el.style.top = data.y + 'px';
      el.dataset.id = data.id;
      el.innerHTML = `
        <div class="sprite-box">${data.sprite}</div>
        <div class="entity-name">${data.name}</div>
      `;
      
      // ถ้าเป็น Agent ให้สามารถคลิกเพื่อสั่งงานได้
      if (isAgent) {
        el.onclick = (e) => {
          e.stopPropagation();
          commandAgent(data);
        };
      }

      room.appendChild(el);
    }

    // ==========================================
    // AGENT LOGIC
    // ==========================================
    function hireAgent() {
      const nameInput = document.getElementById('agentName');
      const roleSelect = document.getElementById('agentRole');

      const name = nameInput.value.trim() || 'Agent-X';
      const role = roleSelect.value;
      const sprite = agentSprites[role];

      // หาจุดว่างให้ Agent (มุมขวาล่าง)
      const room = document.getElementById('officeRoom');
      let x = 96;
      let y = 96;
      
      // พยายามหาช่องว่างแบบง่ายๆ
      while (officeState.agents.some(a => a.x === x && a.y === y)) {
        x += 48;
        if (x > room.clientWidth - 48) {
          x = 48;
          y += 48;
        }
      }

      const agentId = 'agent_' + Date.now();
      const newAgent = {
        id: agentId,
        name: name,
        role: role,
        sprite: sprite,
        x: x,
        y: y
      };

      officeState.agents.push(newAgent);
      renderEntity(newAgent, true);
      
      document.getElementById('agentCount').innerText = `AGENTS: ${officeState.agents.length}`;
      addLog(`> <span class="log-agent">[AGENT DEPLOYED] ${name} (Class: ${role}) ประจำการแล้ว!</span>`);
      
      nameInput.value = '';

      // จำลองการทำงานอัตโนมัติครั้งแรก
      setTimeout(() => simulateAgentTask(newAgent), 2000);
    }

    function commandAgent(agent) {
      addLog(`> <span class="log-agent">[COMMAND] สั่งงาน ${agent.name}...</span>`);
      simulateAgentTask(agent);
    }

    function simulateAgentTask(agent) {
      let taskDetail = "";
      let logClass = "log-agent";

      if(agent.role === 'monitor') {
        taskDetail = "กำลังสแกน S/N อุปกรณ์ในคลัง... พบของว่าง 12 รายการ";
      } else if(agent.role === 'report') {
        taskDetail = "กำลังรวบรวมข้อมูลสถานีเพื่อทำรายงานประจำเดือน...";
      } else if(agent.role === 'fix') {
        taskDetail = "ตรวจพบจอมอนิเตอร์ชำรุด 1 รายการ กำลังบันทึกเพื่อแจ้งซ่อม!";
        logClass = "log-error"; // ให้ขึ้นสีแดงเด่นๆ
      }

      addLog(`> <span class="${logClass}">[${agent.name}] ${taskDetail}</span>`);
    }

    // ==========================================
    // BACKEND INTEGRATION
    // ==========================================
    async function saveOfficeState() {
      addLog(`> <span class="log-system">[SYSTEM] กำลังเชื่อมต่อ Backend เพื่อบันทึก...</span>`);
      
      // เตรียม Log สำหรับส่งไป Telegram ผ่าน Apps Script
      const logs = officeState.agents.map(a => ({
        station: "AI Office",
        action: "Agent Active",
        detail: `Agent ${a.name} (Role: ${a.role}) ประจำการอยู่`
      }));

      try {
        const response = await fetch(BACKEND_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'SAVE_OFFICE_STATE',
            value: JSON.stringify(officeState),
            logs: logs
          })
        });
        const result = await response.json();
        
        if(result.status === 'success') {
          addLog(`> <span class="log-system">[SYSTEM] ✅ บันทึกสถานะสำนักงานสำเร็จ!</span>`);
        } else {
          addLog(`> <span class="log-error">[ERROR] Backend error: ${result.message}</span>`);
        }
      } catch (error) {
        addLog(`> <span class="log-error">[NETWORK ERROR] ไม่สามารถเชื่อมต่อ Backend ได้</span>`);
      }
    }

    async function loadOfficeState() {
      try {
        const response = await fetch(`${BACKEND_URL}?action=GET_OFFICE_STATE`);
        const result = await response.json();
        
        if(result.value) {
          officeState = JSON.parse(result.value);
          
          // ล้างห้องเดิมก่อนแล้ววาดใหม่
          document.querySelectorAll('.pixel-entity').forEach(el => el.remove());
          
          officeState.items.forEach(item => renderEntity(item, false));
          officeState.agents.forEach(agent => renderEntity(agent, true));
          
          document.getElementById('agentCount').innerText = `AGENTS: ${officeState.agents.length}`;
          addLog(`> <span class="log-system">[SYSTEM] ✅ โหลดสถานะสำนักงานล่าสุดสำเร็จ!</span>`);
        }
      } catch (error) {
        addLog(`> <span class="log-error">[LOAD ERROR] ไม่สามารถโหลดข้อมูลเดิมได้</span>`);
      }
    }

    function clearRoom() {
      if(confirm('ต้องการล้างข้อมูลห้องทั้งหมดหรือไม่?')) {
        officeState = { items: [], agents: [] };
        document.querySelectorAll('.pixel-entity').forEach(el => el.remove());
        document.getElementById('agentCount').innerText = `AGENTS: 0`;
        addLog(`> <span class="log-error">[SYSTEM] รีเซ็ตห้องทำงานแล้ว</span>`);
      }
    }

    // ==========================================
    // UI HELPER
    // ==========================================
    function addLog(htmlContent) {
      const terminal = document.getElementById('terminalLog');
      terminal.innerHTML += htmlContent + '<br>';
      terminal.scrollTop = terminal.scrollHeight;
    }
  </script>
</body>
</html>
