<!DOCTYPE html>
<html lang="th" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADP AI Assistant</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Prompt', 'sans-serif'], } } } }</script>
    
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #0f172a; color: white; overflow: hidden; }
        
        /* 🌟 แอนิเมชันน้อง AI ลอยตัว (Floating) */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .ai-pet { animation: float 3s ease-in-out infinite; }
        
        /* 🌟 แอนิเมชันจุดไข่ปลาตอนกำลังพิมพ์ (Typing indicator) */
        .typing-dot { animation: typing 1.4s infinite ease-in-out both; }
        .typing-dot:nth-child(1) { animation-delay: -0.32s; }
        .typing-dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes typing { 0%, 80%, 100% { transform: scale(0); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }

        .chat-bubble { max-width: 85%; transform-origin: bottom left; animation: pop-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        .chat-bubble.user { transform-origin: bottom right; background-color: #3b82f6; border-bottom-right-radius: 4px; margin-left: auto;}
        .chat-bubble.ai { background-color: #1e293b; border-bottom-left-radius: 4px; border: 1px solid #334155;}
        
        @keyframes pop-in { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="h-screen w-screen flex flex-col relative bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]">

    <div class="absolute inset-0 bg-gradient-to-br from-slate-900/90 via-indigo-900/80 to-slate-900/90 z-0"></div>
    
    <div class="relative z-10 p-4 border-b border-white/10 flex justify-between items-center bg-slate-900/50 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-500 rounded-xl flex items-center justify-center font-bold text-xl shadow-[0_0_15px_rgba(99,102,241,0.5)]">A</div>
            <div>
                <h1 class="font-bold tracking-wide">ADP<span class="font-light text-indigo-400"> Assistant</span></h1>
                <p class="text-[10px] text-emerald-400 flex items-center gap-1"><span class="w-1.5 h-1.5 rounded-full bg-emerald-400 animate-pulse"></span> Online & Ready</p>
            </div>
        </div>
        <button onclick="window.location.href='warehouse.html'" class="px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-lg text-xs font-bold transition-colors border border-slate-600">
            กลับหน้าคลังหลัก
        </button>
    </div>

    <div id="chatContainer" class="relative z-10 flex-1 overflow-y-auto custom-scrollbar p-4 flex flex-col gap-4 pb-32">
        
        <div class="chat-bubble ai p-4 rounded-2xl shadow-lg">
            <p class="text-sm leading-relaxed">สวัสดีค่าาาเจ้านาย! หนูชื่อ <span class="font-bold text-indigo-400">"น้องคลัง" (ADP Bot)</span> 👧✨<br>วันนี้มีอะไรให้หนูช่วยจัดการโกดังไหมคะ? เลือกคำสั่งด้านล่างได้เลยยย 👇</p>
        </div>
        
    </div>

    <div class="absolute bottom-[80px] sm:bottom-[100px] left-2 sm:left-10 z-20 pointer-events-none ai-pet">
        <div class="relative">
            <div class="absolute -inset-4 bg-indigo-500/20 rounded-full blur-xl animate-pulse"></div>
            <img src="https://media.giphy.com/media/7Z3ZzYyL717lq/giphy.gif" alt="AI Mascot" class="w-24 h-24 sm:w-32 sm:h-32 object-contain drop-shadow-2xl opacity-90 rounded-full mix-blend-screen pointer-events-auto cursor-pointer" onclick="pokeMascot()" id="mascotImg" style="mix-blend-mode: normal;">
        </div>
    </div>

    <div class="relative z-10 bg-slate-900/80 backdrop-blur-xl border-t border-white/10 p-4 mt-auto">
        <div class="max-w-4xl mx-auto flex flex-wrap gap-2 justify-end sm:justify-end ml-24 sm:ml-40">
            <button onclick="handleAction('COUNT_ALL')" class="bg-slate-800 hover:bg-indigo-600 text-slate-300 hover:text-white px-4 py-2.5 rounded-xl text-xs sm:text-sm font-bold border border-slate-600 transition-all flex items-center gap-1 shadow-lg active:scale-95">
                📦 สรุปของในคลังให้หน่อย
            </button>
            <button onclick="handleAction('CHECK_LOW')" class="bg-slate-800 hover:bg-red-600 text-slate-300 hover:text-white px-4 py-2.5 rounded-xl text-xs sm:text-sm font-bold border border-slate-600 transition-all flex items-center gap-1 shadow-lg active:scale-95">
                🚨 มีอะไรใกล้หมดบ้าง?
            </button>
            <button onclick="handleAction('JOKE')" class="bg-slate-800 hover:bg-emerald-600 text-slate-300 hover:text-white px-4 py-2.5 rounded-xl text-xs sm:text-sm font-bold border border-slate-600 transition-all flex items-center gap-1 shadow-lg active:scale-95">
                ☕ ขอกำลังใจทำงานหน่อย
            </button>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwCut-_LOFpyERCvO2f_kc0MnaowZGZ6VafjwmCBY2sE4VSrDvLuDf-fuQmp5vI9naQ/exec'; 
        let isFetching = false;
        let warehouseDataCache = null;

        const chatContainer = document.getElementById('chatContainer');
        const mascot = document.getElementById('mascotImg');

        function scrollToBottom() {
            chatContainer.scrollTo({ top: chatContainer.scrollHeight, behavior: 'smooth' });
        }

        function appendUserMessage(text) {
            const div = document.createElement('div');
            div.className = 'chat-bubble user p-3 px-5 rounded-2xl shadow-lg text-white font-medium text-sm';
            div.innerText = text;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function appendAIMessage(text, asHTML = false) {
            const div = document.createElement('div');
            div.className = 'chat-bubble ai p-4 rounded-2xl shadow-lg text-sm text-slate-200 ml-12 sm:ml-16'; // เว้นที่ให้น้อง AI
            if(asHTML) div.innerHTML = text;
            else div.innerText = text;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function showTyping() {
            const div = document.createElement('div');
            div.id = 'typingIndicator';
            div.className = 'chat-bubble ai p-4 rounded-2xl shadow-lg flex gap-1 items-center ml-12 sm:ml-16 w-max';
            div.innerHTML = `<div class="w-2 h-2 bg-indigo-400 rounded-full typing-dot"></div><div class="w-2 h-2 bg-indigo-400 rounded-full typing-dot"></div><div class="w-2 h-2 bg-indigo-400 rounded-full typing-dot"></div>`;
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if(typing) typing.remove();
        }

        function pokeMascot() {
            mascot.style.transform = "scale(1.2) rotate(10deg)";
            setTimeout(() => { mascot.style.transform = "scale(1) rotate(0deg)"; }, 200);
            
            const pokes = ["จิ้มหนูทำไมคะเจ้านายยยย 😆", "พร้อมรับคำสั่งค่ะ! 🫡", "หนูตั้งใจทำงานอยู่นะคะ 💻", "ระบบคลังปกติ 100% ค่าาา ✨"];
            if(!isFetching) appendAIMessage(pokes[Math.floor(Math.random() * pokes.length)]);
        }

        async function fetchWarehouseData() {
            if (warehouseDataCache) return warehouseDataCache;
            const res = await fetch(`${API_URL}?key=ALL_DATA`);
            const data = await res.json();
            warehouseDataCache = data.value;
            return warehouseDataCache;
        }

        async function handleAction(action) {
            if(isFetching) return;
            isFetching = true;

            if (action === 'COUNT_ALL') {
                appendUserMessage('สรุปของในคลังหลักให้หน่อย ตอนนี้มีอะไรบ้าง?');
                showTyping();
                
                try {
                    const data = await fetchWarehouseData();
                    let mainData = JSON.parse(data['ADP_WAREHOUSE_CENTRAL'] || '{"main":[]}');
                    
                    let count = { pc:0, nb:0, mon:0, prn:0, other:0 };
                    mainData.main.forEach(r => {
                        if(r[5] && r[5].includes('ว่าง')) {
                            let type = String(r[1]).toLowerCase();
                            if(type.includes('pc')) count.pc++;
                            else if(type.includes('notebook')) count.nb++;
                            else if(type.includes('monitor')) count.mon++;
                            else if(type.includes('printer')) count.prn++;
                            else count.other++;
                        }
                    });

                    removeTyping();
                    let msg = `วิ่งไปนับสต็อกที่ **โกดังหลัก (พร้อมจ่าย)** มาให้แล้วค่าา 🏃‍♀️💨<br><br>
                               💻 PC: <span class="text-emerald-400 font-bold">${count.pc}</span> เครื่อง<br>
                               💻 โน๊ตบุ๊ค: <span class="text-emerald-400 font-bold">${count.nb}</span> เครื่อง<br>
                               🖥️ จอภาพ: <span class="text-emerald-400 font-bold">${count.mon}</span> จอ<br>
                               🖨️ ปริ้นเตอร์: <span class="text-emerald-400 font-bold">${count.prn}</span> เครื่อง<br>
                               🛠️ อุปกรณ์อื่นๆ: <span class="text-emerald-400 font-bold">${count.other}</span> ชิ้น<br><br>
                               ระบบบันทึกยอดตรงเป๊ะเลยค่ะเจ้านาย! ✨`;
                    appendAIMessage(msg, true);
                } catch(e) {
                    removeTyping(); appendAIMessage("ง่ะ... หนูเชื่อมต่อโกดังไม่ได้ค่ะ ลองใหม่อีกทีนะคะ 🥺");
                }
            } 
            else if (action === 'CHECK_LOW') {
                appendUserMessage('เช็คหน่อยว่ามีอะไหล่ หรือ หมึกพิมพ์ อะไรใกล้หมดบ้าง?');
                showTyping();
                
                try {
                    const data = await fetchWarehouseData();
                    let supData = JSON.parse(data['ADP_WAREHOUSE_SUPPLIES'] || '{"ink":[], "accessories":[], "parts":[]}');
                    
                    let lowItems = [];
                    const checkArr = (arr, typeName, idxQty) => {
                        if(!arr) return;
                        arr.forEach(r => {
                            let qty = parseFloat(r[idxQty]);
                            if(!isNaN(qty) && qty <= 5) {
                                let name = String(r[1] || '') + " " + String(r[2] || '');
                                lowItems.push(`- [${typeName}] ${name} (เหลือ <span class="${qty===0?'text-red-400 animate-pulse font-bold':'text-amber-400 font-bold'}">${qty}</span>)`);
                            }
                        });
                    };

                    checkArr(supData.ink, 'หมึก', 3);
                    checkArr(supData.parts, 'อะไหล่', 3);
                    checkArr(supData.accessories, 'อุปกรณ์', 4);

                    removeTyping();
                    if(lowItems.length > 0) {
                        let msg = `เจอแล้วค่ะ! 🚨 รายการด้านล่างนี้ใกล้หมด หรือ หมดสต็อกไปแล้ว เจ้านายรีบทำเรื่องซื้อด่วนเลยนะคะ:<br><br>${lowItems.join('<br>')}`;
                        appendAIMessage(msg, true);
                    } else {
                        appendAIMessage("หนูเช็คให้แล้วค่ะ! ตอนนี้สต็อกอะไหล่และหมึกพิมพ์ยังแน่นๆ ไม่มีอะไรเหลือน้อยกว่า 5 ชิ้นเลยค่ะ สบายใจได้! 🥰");
                    }
                } catch(e) {
                    removeTyping(); appendAIMessage("หนูหากุญแจห้องอะไหล่ไม่เจอค่ะ ระบบเชื่อมต่อขัดข้อง 😭");
                }
            }
            else if (action === 'JOKE') {
                appendUserMessage('ขอกำลังใจทำงานหน่อย วันนี้เหนื่อยมาก');
                showTyping();
                setTimeout(() => {
                    removeTyping();
                    const jokes = [
                        "เหนื่อยก็พัก ถ้าน่ารักก็มาหาหนูนะคะ 🥺 สู้ๆ ค่าเจ้านายยย!",
                        "โกดังยังมีของหมด แต่กำลังใจจากหนูไม่มีวันหมดนะคะ 💖 ลุยยย!",
                        "ดื่มกาแฟสักแก้วไหมคะ ☕ เดี๋ยวหนูช่วยเฝ้าหน้าจอให้เองค่ะ!",
                        "รู้ไหมคะว่าเครื่อง Server ที่ว่าอึด ยังสู้ความขยันของเจ้านายไม่ได้เลย! สุดยอดมากค่ะ 👍"
                    ];
                    appendAIMessage(jokes[Math.floor(Math.random() * jokes.length)]);
                }, 1000);
            }

            isFetching = false;
        }

        // เริ่มต้นด้วยการให้ AI ทักทายกระดิกนิดนึง
        setTimeout(pokeMascot, 1000);
    </script>
</body>
</html>
